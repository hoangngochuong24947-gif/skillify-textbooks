name: Validate Skill Definition

on:
  push:
    branches: [main, master]
    paths:
      - "skills/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/validate-skill.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "skills/**"
      - "scripts/**"
      - "tests/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Skill Files

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install yq
        run: |
          if ! command -v yq &> /dev/null; then
            wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            chmod +x /usr/local/bin/yq
          fi

      - name: Validate generated skill directories
        run: |
          for dir in skills/*; do
            [ -d "$dir" ] || continue
            name="$(basename "$dir")"
            if [ "$name" = "book-to-skills" ] || [ "$name" = ".claude" ]; then
              continue
            fi

            echo "Checking generated skill directory: $name"
            test -f "$dir/SKILL.md"
            test -f "$dir/workflow.yaml"
            test -d "$dir/references"
            test -d "$dir/queries"

            yq eval '.' "$dir/workflow.yaml" > /dev/null
          done

      - name: Validate book-to-skills core references
        run: |
          test -f "skills/book-to-skills/SKILL.md"
          test -f "skills/book-to-skills/parallel-manifest.yaml"
          test -f "skills/book-to-skills/references/query-packs.md"
          test -f "skills/book-to-skills/references/output-schemas.md"

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -p "test_*.py"
